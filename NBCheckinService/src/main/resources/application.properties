spring.application.name=NBCheckinService

# ========== SERVER CONFIGURATION ==========
server.port=8082
server.servlet.context-path=/api/v1

# ========== DATASOURCE & JPA ==========
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/nb_checkin}
spring.datasource.username=amangeldimadina
spring.datasource.password=mayddee
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ========== FLYWAY ==========
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ========== SECURITY (JWT) ==========
jwt.secret=RjvtMF7pgKMqcaeQPzmP0aGgHbOOX8ytteqBjbGIBDw=
jwt.expiration=86400000

# ========== KAFKA CONFIGURATION ==========
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
# Producer Settings
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=true

# Consumer Settings
spring.kafka.consumer.group-id=health-metrics-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

kafka.topics.checkin-created=checkin.created
kafka.topics.sleep-logged=sleep.logged
kafka.topics.game-completed=game.completed

# ========== LOGGING ==========
logging.level.root=INFO
logging.level.org.example.nbcheckinservice=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.apache.kafka=INFO

# ========== EXTERNAL SERVICES ==========
ml.service.url=${ML_SERVICE_URL:http://localhost:5001}
# ========== GAMIFICATION & STREAKS ==========
app.name=Neural Balance Check-in Service
app.version=1.0.0
app.streak.xp-per-day=10
app.streak.bonus-xp-milestones[0].days=7
app.streak.bonus-xp-milestones[0].xp=50
app.streak.bonus-xp-milestones[1].days=14
app.streak.bonus-xp-milestones[1].xp=100
app.streak.bonus-xp-milestones[2].days=30
app.streak.bonus-xp-milestones[2].xp=300
app.streak.bonus-xp-milestones[3].days=100
app.streak.bonus-xp-milestones[3].xp=1000